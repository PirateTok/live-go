// TikTok Live WebSocket frames and event messages.
// Field tags match TikTok's wire protocol — names are our own.
syntax = "proto3";

import "proto/types.proto";

option go_package = "github.com/PirateTok/live-go/proto";


// ---- WebSocket framing ----

// Heartbeat payload sent every 10s
message HeartbeatMessage {
  uint64 room_id = 1;
}

// Room join request sent after first heartbeat
message WebcastImEnterRoomMessage {
  int64 room_id = 1;
  string room_tag = 2;
  string live_region = 3;
  int64 live_id = 4;
  string identity = 5;
  string cursor = 6;
  int64 account_type = 7;
  int64 enter_unique_id = 8;
  string filter_welcome_msg = 9;
  bool is_anchor_continue_keep_msg = 10;
}

// Outer frame wrapping all WSS data
message WebcastPushFrame {
  uint64 seq_id = 1;
  uint64 log_id = 2;
  uint64 service = 3;
  uint64 method = 4;
  map<string, string> headers = 5;
  string payload_encoding = 6;
  string payload_type = 7;
  bytes payload = 8;
}

// Decoded push frame payload containing event messages
message WebcastResponse {
  repeated Message messages = 1;
  string cursor = 2;
  int64 fetch_interval = 3;
  int64 now = 4;
  bytes internal_ext = 5;
  int32 fetch_type = 6;
  map<string, string> route_params_map = 7;
  int64 heartbeat_duration = 8;
  bool needs_ack = 9;
  string push_server = 10;
  bool is_first = 11;
  string history_comment_cursor = 12;
  bool history_no_more = 13;

  // Individual event message within a response
  message Message {
    string method = 1;
    bytes payload = 2;
    int64 msg_id = 3;
    int32 msg_type = 4;
    int64 offset = 5;
    bool is_history = 6;
  }
}


// ---- Core events ----

// Chat message from viewer
message WebcastChatMessage {
  Common common = 1;
  User user = 2;
  string content = 3;
  bool visible_to_sender = 4;
  Image background_image = 5;
  string full_screen_text_color = 6;
  Image background_image_v2 = 7;
  Image gift_image = 10;
  int32 input_type = 11;
  User at_user = 12;
  repeated EmoteWithIndex emotes_list = 13;
  string content_language = 14;
  UserIdentity user_identity = 18;

  message EmoteWithIndex {
    int64 index = 1;
    Emote emote = 2;
  }
}

// Gift sent by viewer
message WebcastGiftMessage {
  Common common = 1;
  int64 gift_id = 2;
  int64 fan_ticket_count = 3;
  int32 group_count = 4;
  int32 repeat_count = 5;
  int32 combo_count = 6;
  User user = 7;
  User to_user = 8;
  int32 repeat_end = 9;
  int64 group_id = 11;
  int64 room_fan_ticket_count = 13;
  GiftStruct gift = 15;
  string log_id = 16;
  int64 send_type = 17;
  string monitor_extra = 22;
  GiftReciever user_gift_reciever = 23;
  int64 color_id = 24;
  bool is_first_sent = 25;
  string order_id = 28;
  UserIdentity user_identity = 32;

  message GiftReciever {
    int64 user_id = 1;
    string device_name = 10;
  }
}

// Likes from viewer (batched, max 15 per message)
message WebcastLikeMessage {
  Common common = 1;
  int32 count = 2;
  int32 total = 3;
  User user = 5;
}

// User join/subscribe (sub-routed: action=1 -> Join)
message WebcastMemberMessage {
  Common common = 1;
  User user = 2;
  int32 member_count = 3;
  User operator = 4;
  bool is_set_to_admin = 5;
  bool is_top_user = 6;
  int64 rank_score = 7;
  int64 top_user_no = 8;
  int64 enter_type = 9;
  MemberMessageAction action = 10;
  string action_description = 11;
  int64 user_id = 12;
  EffectConfig effect_config = 13;
  string pop_str = 14;
  EffectConfig enter_effect_config = 15;
  Image background_image = 16;
  Image background_image_v2 = 17;
  Text anchor_display_text = 18;

  message EffectConfig {
    int64 type = 1;
    Image icon = 2;
    int64 avatar_pos = 3;
    Text text = 4;
    Image text_icon = 5;
    int32 stay_time = 6;
    int64 anim_asset_id = 7;
    Image badge = 8;
  }
}

// Social events: follow/share (sub-routed by action field)
message WebcastSocialMessage {
  Common common = 1;
  User user = 2;
  int64 share_type = 3;
  int64 action = 4;
  string share_target = 5;
  int32 follow_count = 6;
  int64 share_display_style = 7;
  int32 share_count = 8;
}

// Viewer count and top viewers
message WebcastRoomUserSeqMessage {
  Common common = 1;
  repeated Contributor ranks_list = 2;
  int64 total = 3;
  string pop_str = 4;
  repeated Contributor seats_list = 5;
  int64 popularity = 6;
  int32 total_user = 7;
  int64 anonymous = 8;

  message Contributor {
    int32 score = 1;
    User user = 2;
    int32 rank = 3;
    int64 delta = 4;
  }
}

// Stream control (sub-routed: action=3 -> LiveEnded)
message WebcastControlMessage {
  Common common = 1;
  ControlAction action = 2;
  string tips = 3;
  Extra extra = 4;
  Text perception_audience_text = 6;
  PunishEventInfo punish_info = 7;
  Text float_text = 8;
  int32 float_style = 9;

  message Extra {
    string ban_info_url = 1;
    int64 reason_no = 2;
    Text title = 3;
    Text violation_reason = 4;
    Text content = 5;
    Text got_it_button = 6;
    Text ban_detail_button = 7;
    string source = 8;
  }
}


// ---- Useful events ----

// Stream title/intro
message WebcastLiveIntroMessage {
  Common common = 1;
  int64 room_id = 2;
  AuditStatus audit_status = 3;
  string content = 4;
  User host = 5;
  int32 intro_mode = 6;
  repeated BadgeStruct badges = 7;
  string language = 8;
}

// Room-level system message
message WebcastRoomMessage {
  Common common = 1;
  string content = 2;
}

// Live closed captions
message WebcastCaptionMessage {
  Common common = 1;
  uint64 time_stamp = 2;
  CaptionData caption_data = 4;

  message CaptionData {
    string language = 1;
    string text = 2;
  }
}

// Donation goal progress
message WebcastGoalUpdateMessage {
  Common common = 1;
  Indicator indicator = 2;
  Goal goal = 3;
  int64 contributor_id = 4;
  Image contributor_avatar = 5;
  string contributor_display_id = 6;
  int64 contribute_count = 9;
  int64 contribute_score = 10;
  int64 gift_repeat_count = 11;
  string contributor_id_str = 12;
  bool pin = 13;
  bool unpin = 14;
}

// Message deletion (moderation)
message WebcastImDeleteMessage {
  Common common = 1;
  repeated int64 delete_msg_ids_list = 2;
  repeated int64 delete_user_ids_list = 3;
}


// ---- Niche events ----

// Rank change notification
message WebcastRankUpdateMessage {
  Common common = 1;
  repeated RankUpdate updates_list = 2;
  int64 group_type = 3;
  int64 priority = 5;
  repeated RankTabInfo tabs_list = 6;

  message RankTabInfo {
    int64 rank_type = 1;
    string title = 2;
    Text title_text = 3;
  }

  message RankUpdate {
    int64 rank_type = 1;
    int64 owner_rank = 2;
    Text default_content = 3;
    bool show_entrance_animation = 5;
    int64 countdown = 6;
  }
}

// Viewer poll
message WebcastPollMessage {
  Common common = 1;
  MessageType message_type = 2;
  int64 poll_id = 3;
  PollStartContent start_content = 4;
  PollEndContent end_content = 5;
  PollUpdateVotesContent update_content = 6;
  int32 poll_kind = 7;
}

// Red envelope / treasure box
message WebcastEnvelopeMessage {
  Common common = 1;
  EnvelopeInfo envelope_info = 2;
  EnvelopeDisplay display = 3;

  message EnvelopeInfo {
    string envelope_id = 1;
    EnvelopeBusinessType business_type = 2;
    string envelope_idc = 3;
    string send_user_name = 4;
    int32 diamond_count = 5;
    int32 people_count = 6;
    int32 unpack_at = 7;
    string send_user_id = 8;
    Image send_user_avatar = 9;
    string create_at = 10;
    string room_id = 11;
    EnvelopeFollowShowStatus follow_show_status = 12;
    int32 skin_id = 13;
  }
}

// Pinned chat message
message WebcastRoomPinMessage {
  Common common = 1;
  bytes pinned_message = 2;
  string original_msg_type = 30;
  uint64 timestamp = 31;
}

// Shadow/unauthorized viewer
message WebcastUnauthorizedMemberMessage {
  Common common = 1;
  int32 action = 2;
  Text nick_name_prefix = 3;
  string nick_name = 4;
  Text enter_text = 5;
}

// Co-stream / linkmic method
message WebcastLinkMicMethod {
  Common common = 1;
  MessageType message_type = 2;
  string access_key = 3;
  int64 anchor_linkmic_id = 4;
  int64 user_id = 5;
  int64 fan_ticket = 6;
  int64 total_link_mic_fan_ticket = 7;
  int64 channel_id = 8;
  int64 layout = 9;
}

// Battle between streamers
message WebcastLinkMicBattle {
  Common common = 1;
  uint64 id = 2;
  BattleConfig battle_config = 3;
  LinkMicBattleStatus battle_status = 4;
  repeated BattleDetails details = 5;
  repeated BattleTopViewers viewer_team = 9;
  repeated BattleHost host_team = 10;
  repeated BattleTeamData team_data = 13;

  message BattleConfig {
    uint64 id1 = 1;
    uint64 timestamp = 2;
    uint32 data1 = 3;
    uint64 id2 = 4;
  }

  message BattleTeamData {
    uint64 team_id = 1;
    BattleData data = 2;
  }

  message BattleData {
    uint64 id = 1;
    uint32 data1 = 2;
    uint32 win_streak = 3;
  }

  message BattleDetails {
    uint64 id = 1;
    DetailsSummary summary = 2;
    message DetailsSummary {
      uint64 id = 1;
      uint32 points = 3;
    }
  }

  message BattleTopViewers {
    uint64 id = 1;
    repeated ViewerGroup viewer_group = 2;
    message ViewerGroup {
      repeated TopViewer viewer = 1;
      uint32 points = 2;
      message TopViewer {
        uint64 id = 1;
        uint32 points = 2;
        string profile_id = 3;
        repeated Image images = 4;
      }
    }
  }

  message BattleHost {
    uint64 id = 1;
    repeated HostGroup host_group = 2;
    message HostGroup {
      repeated Host host = 1;
      uint32 points = 2;
      string host_id = 3;
      message Host {
        uint64 id = 1;
        string profile_id = 2;
        repeated Image images = 3;
        string name = 4;
      }
    }
  }
}

// Battle armies (team scores)
message WebcastLinkMicArmies {
  Common common = 1;
  uint64 id = 2;
  repeated LinkMicArmiesItems battle_items = 3;
  uint64 id2 = 4;
  uint64 time_stamp1 = 5;
  uint64 time_stamp2 = 6;
  LinkMicBattleStatus battle_status = 7;
}

// Link event
message WebcastLinkMessage {
  Common common = 1;
  LinkMessageType message_type = 2;
  int64 linker_id = 3;
  Scene scene = 4;
  LinkerInviteContent invite_content = 5;
  LinkerReplyContent reply_content = 6;
  LinkerCreateContent create_content = 7;
  LinkerCloseContent close_content = 8;
  LinkerEnterContent enter_content = 9;
  LinkerLeaveContent leave_content = 10;
  LinkerCancelContent cancel_content = 11;
  LinkerKickOutContent kick_out_content = 12;
  LinkerLinkedListChangeContent linked_list_change_content = 13;
  LinkerUpdateUserContent update_user_content = 14;
  LinkerWaitingListChangeContent waiting_list_change_content = 15;
  LinkerMuteContent mute_content = 16;
  LinkerRandomMatchContent random_match_content = 17;
  LinkerUpdateUserSettingContent update_user_setting_content = 18;
  LinkerMicIdxUpdateContent mic_idx_update_content = 19;
  LinkerListChangeContent list_change_content = 20;
  CohostListChangeContent cohost_list_change_content = 21;
  LinkerMediaChangeContent media_change_content = 22;
  LinkerAcceptNoticeContent accept_notice_content = 23;
  LinkerSysKickOutContent sys_kick_out_content = 101;
  LinkmicUserToastContent user_toast_content = 102;
  string extra = 200;
  int64 expire_timestamp = 201;
}

// Link layer event
message WebcastLinkLayerMessage {
  Common common = 1;
  MessageType message_type = 2;
  int64 channel_id = 3;
  Scene scene = 4;
  CreateChannelContent create_channel_content = 100;
  ListChangeContent list_change_content = 102;
  InviteContent invite_content = 103;
  ApplyContent apply_content = 104;
  PermitApplyContent permit_apply_content = 105;
  ReplyInviteContent reply_invite_content = 106;
  KickOutContent kick_out_content = 107;
  CancelApplyContent cancel_apply_content = 108;
  CancelInviteContent cancel_invite_content = 109;
  LeaveContent leave_content = 110;
  FinishChannelContent finish_content = 111;
  JoinDirectContent join_direct_content = 112;
  JoinGroupContent join_group_content = 113;
  PermitJoinGroupContent permit_group_content = 114;
  CancelJoinGroupContent cancel_group_content = 115;
  LeaveJoinGroupContent leave_group_content = 116;
  P2PGroupChangeContent p2p_group_change_content = 117;
  BusinessContent business_content = 200;
}

// Layout state
message WebcastLinkMicLayoutStateMessage {
  bytes common_raw = 1;
  int64 room_id = 2;
  int32 layout_state = 3;
  string layout_key = 6;
}

// Gift panel update
message WebcastGiftPanelUpdateMessage {
  bytes common_raw = 1;
  int64 room_id = 2;
  int64 panel_ts_or_version = 3;
  bytes panel_blob = 10;
  bytes gift_list_blob = 11;
  bytes vault_blob = 12;
}

// In-room banner
message WebcastInRoomBannerMessage {
  Common header = 1;
  string json = 2;
}

// Guide prompt
message WebcastGuideMessage {
  bytes common_raw = 1;
  int32 guide_type = 2;
  int64 duration_ms = 5;
  string scene = 7;
}

// Emote-only chat
message WebcastEmoteChatMessage {
  Common common = 1;
  User user = 2;
  repeated Emote emote_list = 3;
  MsgFilter msg_filter = 4;
  UserIdentity user_identity = 5;
}

// Q&A question
message WebcastQuestionNewMessage {
  Common common = 1;
  QuestionDetails details = 2;

  message QuestionDetails {
    uint64 id = 1;
    string text = 2;
    uint64 time_stamp = 4;
    User user = 5;
  }
}

// Subscription notification
message WebcastSubNotifyMessage {
  Common common = 1;
  User user = 2;
  int64 sub_month = 4;
  SubscribeType subscribe_type = 5;
  OldSubscribeStatus old_subscribe_status = 6;
  SubscribingStatus subscribing_status = 8;
  bool is_send = 9;
  bool is_custom = 10;
}

// Scrolling text banner
message WebcastBarrageMessage {
  Common common = 1;
  BarrageEvent event = 2;
  int32 msg_type = 3;
  Image icon = 4;
  Text content = 5;
  int32 duration = 6;
  Image background = 7;

  message BarrageEvent {
    string event_name = 1;
  }
}

// Hourly ranking
message WebcastHourlyRankMessage {
  Common common = 1;
  RankContainer data = 2;

  message RankContainer {
    uint32 data1 = 1;
    RankingData ranking_data = 2;
    Ranking rankings = 4;

    message RankingData {
      uint32 data1 = 1;
      Ranking rank_data = 2;
      string data2 = 3;
    }
  }
}

// Moderation / detection event
message WebcastMsgDetectMessage {
  Common common = 1;
  int32 detect_type = 2;
  TriggerCondition trigger_condition = 3;
  TimeInfo time_info = 4;
  int32 trigger_by = 5;
  string from_region = 6;

  message TimeInfo {
    int64 client_start_ms = 1;
    int64 api_recv_time_ms = 2;
    int64 api_send_to_goim_ms = 3;
  }

  message TriggerCondition {
    bool uplink_detect_http = 1;
    bool uplink_detect_websocket = 2;
    bool detect_p2p_msg = 3;
    bool detect_room_msg = 4;
    bool http_optimize = 5;
  }
}

// Fan ticket method
message WebcastLinkMicFanTicketMethod {
  Common common = 1;
  FanTicketRoomNoticeContent fan_ticket_room_notice = 2;
}

// Room verification / closure
message RoomVerifyMessage {
  Common common = 1;
  int32 action = 2;
  string content = 3;
  int64 notice_type = 4;
  bool close_room = 5;
}

// Live shopping event
message WebcastOecLiveShoppingMessage {
  Common common = 1;
  uint32 data1 = 2;
  LiveShoppingData shop_data = 4;
  TimeStampContainer shop_timings = 5;
  LiveShoppingDetails details = 9;

  message LiveShoppingData {
    string title = 1;
    string price_string = 2;
    string image_url = 3;
    string shop_url = 4;
    string shop_name = 7;
    string shop_url2 = 9;
  }

  message LiveShoppingDetails {
    string id1 = 1;
    string data1 = 3;
    uint64 timestamp = 5;
    ValueLabel data = 6;
  }
}

// Gift broadcast
message WebcastGiftBroadcastMessage {
  Common common = 1;
  bytes broadcast_data_blob = 2;
}

// Ranking text / badges
message WebcastRankTextMessage {
  Common common = 1;
  int32 scene = 2;
  int64 owner_idx_before_update = 3;
  int64 owner_idx_after_update = 4;
  Text self_get_badge_msg = 5;
  Text other_get_badge_msg = 6;
  int64 cur_user_id = 7;
}

// Gift restrictions
message WebcastGiftDynamicRestrictionMessage {
  bytes common_raw = 1;
  bytes restriction_blob = 2;
}

// Viewer picks
message WebcastViewerPicksUpdateMessage {
  bytes common_raw = 1;
  int32 update_type = 2;
  bytes picks_blob = 3;
}


